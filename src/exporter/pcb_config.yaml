# PCB(Gen3 제어보드) 운용 config — data_crawler.py가 PCB 머신에서만 로드.
# "machine 모델이 바뀌면 같이 바뀌는 값"은 여기가 아니라 machine_config.py로.
# 이 파일은 "PCB가 있을 때만 의미 있는" 운용 knob.
# web UI 편집 → REST API → 파일 write → 다음 cycle에 mtime watch로 핫리로드.
modbus:
  port:
    - /dev/serial0
    - /dev/ttyUSB0
  baud:
    - 115200
    - 9600
  slave: 1
  parity: 'N'
  stopbits: 1
  bytesize: 8
  timeout_seconds: 1
loop:
  cycle_seconds: 1
pwm_freq:
  tim1: 1000
  tim2: 25000
  tim8: 25000
initial_pwm_duty:
  pump:
    ch1: 600
    ch2: 600
    ch3: 600
    ch4: 600
  fan:
    ch5: 0
    ch6: 0
    ch7: 80        # 8% — fan_curve.min_duty와 일치 (영구 회전 baseline)
    ch8: 80
    ch9: 80
    ch10: 1000     # RPi cooling fan, always 100%
    ch11: 0
    ch12: 0
initial_dout_bitmask: 0
fan_curve:
  min_temp: 25
  max_temp: 60
  min_duty: 80     # 8%
  max_duty: 1000
comm:
  timeout_after_failures: 3
  disconnected_after_failures: 10
pump:
  max_flow_lpm: 16
  flow_multiplier: 1.47
wiring:
  ntc:
    inlet1: 13
    outlet1: 14
    outlet2: 15
    inlet2: 16
  din:
    level_bit: 1
  ain:
    leak_ch: 8
    leak_threshold_v: 2
  pulse:
    fan_tach_chs:
      - 8
      - 9
  pwm:
    pump_ch:
      - 1
      - 2
      - 3
      - 4
    fan_ch:
      - 7
      - 8
      - 9
