# control_board/config.yaml
# control_board 서비스가 부팅 시 로드하는 런타임 source of truth.
# Flash 영구 저장 항목 (PWM freq HR12/13/14, polarity HR16, ADC gain HR19~26)
# 은 PCB 측에서 관리되며 본 파일에서 다루지 않는다.

# === Modbus 통신 ===

modbus:
  # 순서대로 try — /dev/serial0 (Pi 내장 UART, 운영) 안 되면 /dev/ttyUSB0 (USB-RS485 어댑터)
  port:
    - /dev/serial0
    - /dev/ttyUSB0
  baud: 115200           # DIP6 ON
  slave: 1               # DIP1~5 (모두 OFF → ID 1)
  parity: N
  stopbits: 1
  bytesize: 8
  timeout_seconds: 1.0

loop:
  cycle_seconds: 1.0     # 메인 루프 cadence

# === 매 부팅 시 PCB에 Write할 초기값 (Flash 미저장 항목) ===

# PWM duty 초기값 (HR 0~11, 0~1000 = 0~100.0%).
# 팬 duty는 controller 첫 cycle에서 outlet 온도 lookup으로 즉시 덮어쓰임.
initial_pwm_duty:
  # TIM1 (HR 0~3) — 펌프. 고정 60% 운용.
  pump:
    ch1: 600
    ch2: 600
    ch3: 600
    ch4: 600
  # TIM2 (HR 4~7) — 팬. fan_curve idle floor.
  # TIM8 (HR 8~11) — 팬.
  fan:
    ch5: 200
    ch6: 200
    ch7: 200
    ch8: 200
    ch9: 200
    ch10: 200
    ch11: 200
    ch12: 200

# DOUT 초기 비트마스크 (HR 15, bit0~5 = DOUT1~6)
initial_dout_bitmask: 0x00

# === Fan curve (Stage 1 lookup) ===
# outlet 온도 °C → fan duty 0~1000.
# until_outlet: null = ceiling (해당 온도 이상 전부)
fan_curve:
  hysteresis_c: 1.0
  stages:
    - { until_outlet: 30,   duty: 200 }    # < 30 °C : 20%
    - { until_outlet: 40,   duty: 400 }    # 30~40   : 40%
    - { until_outlet: 50,   duty: 650 }    # 40~50   : 65%
    - { until_outlet: 60,   duty: 850 }    # 50~60   : 85%
    - { until_outlet: 65, duty: 1000 }   # ≥ 60    : 100%

# === 통신 상태 카운터 ===
# 센서값 임계 알람은 Prometheus alert rule + Grafana 측에서 raw metric으로 평가.
# 통신 상태는 control_board 내부 상태라 자체 카운트가 필요 — comm_status 단일 키만 갱신.
comm:
  timeout_after_failures: 3
  disconnected_after_failures: 10

# === 입력 채널 와이어링 (TBD — 도면 확정 후 갱신) ===
# 각 센서가 PCB의 어느 입력 채널에 연결되는지 명시.
# 미연결 항목은 null. NTC 자동 감지(-999)로도 일부 fallback 가능.

wiring:
  # NTC 입력 (IR 28~31, CH13~16) — dg5R 4개 모두 사용
  # 사용자 결선 순서: NTC1=Inlet1, NTC2=Outlet1, NTC3=Outlet2, NTC4=Inlet2
  ntc:
    inlet1:  13   # NTC1
    outlet1: 14   # NTC2
    outlet2: 15   # NTC3
    inlet2:  16   # NTC4

  # DIN 입력 (IR 25 bit0~5 = DIN1~6) — 누수=D1(DIN1), 수위=D2(DIN2)
  din:
    leak_bit: 0    # DIN1
    level_bit: 1   # DIN2

  # Pulse Freq 입력 (IR 13~24, CH1~12)
  # 가정: PWM 출력 CH N의 Tach가 같은 번호 Pulse 입력 CH N으로 라우팅
  pulse:
    pump_tach_chs: [1, 2, 3, 4]   # 펌프 4대 Tach
    fan_tach_chs:  [9, 10]        # 팬 2채널 Tach

  # PWM 출력 (HR 0~11, CH1~12)
  pwm:
    pump_ch: [1, 2, 3, 4]   # 펌프 4대 (TIM1, 동일 duty)
    fan_ch:  [9, 10]        # 팬 2채널 (TIM8)
