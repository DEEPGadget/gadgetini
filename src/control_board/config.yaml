modbus:
  port:
    - /dev/serial0
    - /dev/ttyUSB0
  baud:
    - 115200
    - 9600
  slave: 1
  parity: 'N'
  stopbits: 1
  bytesize: 8
  timeout_seconds: 1
loop:
  cycle_seconds: 1
pwm_freq:
  tim1: 1000      # HR 12 — CH1~4  (pump, 1 kHz)
  tim2: 25000     # HR 13 — CH5~8  (fan,  25 kHz)
  tim8: 25000     # HR 14 — CH9~12 (fan,  25 kHz)
initial_pwm_duty:
  pump:
    ch1: 600
    ch2: 600
    ch3: 600
    ch4: 600
  fan:
    ch5: 200
    ch6: 200
    ch7: 200
    ch8: 200
    ch9: 200
    ch10: 200
    ch11: 200
    ch12: 200
initial_dout_bitmask: 0
fan_curve:
  hysteresis_c: 1
  stages:
    - until_outlet: 30
      duty: 200
    - until_outlet: 40
      duty: 400
    - until_outlet: 50
      duty: 650
    - until_outlet: 60
      duty: 850
    - until_outlet: 65
      duty: 1000
comm:
  timeout_after_failures: 3
  disconnected_after_failures: 10
pump:
  max_flow_lpm: 16
  flow_multiplier: 1.47
wiring:
  ntc:
    inlet1: 13
    outlet1: 14
    outlet2: 15
    inlet2: 16
  din:
    level_bit: 1     # DIN2 (D12) — 수위 (1=정상, 0=LOW)
  ain:
    leak_ch: 8                 # CH8 AIN — 누수 센서 (D11에서 변경됨, 2026-04-29)
    leak_threshold_v: 5.0      # voltage < 5V → 누수 (wet≈0V, dry≈10.5V)
  pulse:
    fan_tach_chs:
      - 9
      - 10
  pwm:
    pump_ch:
      - 1
      - 2
      - 3
      - 4
    fan_ch:
      - 9
      - 10
